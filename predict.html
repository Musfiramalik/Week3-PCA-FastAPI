<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict - Steel Energy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        nav {
            background-color: #2c3e50;
            padding: 15px 30px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 25px;
            font-size: 16px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #34495e;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #e8f6ef;
            border: 1px solid #27ae60;
            border-radius: 4px;
            text-align: center;
            font-size: 18px;
            color: #1e7e4d;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/predict">Prediction</a>
    </nav>

    <div class="container">
        <h1>Predict Energy Consumption</h1>

        <form method="post" action="/predict">

            <label>Lagging Current Reactive Power (kVarh)</label>
            <input type="number" step="any" name="lagging_reactive" required>

            <label>Leading Current Reactive Power (kVarh)</label>
            <input type="number" step="any" name="leading_reactive" required>

            <label>CO2 (tCO2)</label>
            <input type="number" step="any" name="co2" required>

            <label>Lagging Current Power Factor</label>
            <input type="number" step="any" name="lagging_pf" required>

            <label>Leading Current Power Factor</label>
            <input type="number" step="any" name="leading_pf" required>

            <label>NSM (Seconds from Midnight)</label>
            <input type="number" step="any" name="nsm" required>

            <label>Hour of Day (0-23)</label>
            <input type="number" step="1" min="0" max="23" name="hour" required>

            <label>Power Factor Ratio</label>
            <input type="number" step="any" name="power_factor_ratio" required>

            <label>Week Status</label>
            <select name="week_status">
                <option value="Weekday">Weekday</option>
                <option value="Weekend">Weekend</option>
            </select>

            <label>Day of Week</label>
            <select name="day_of_week">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>

            <label>Load Type</label>
            <select name="load_type">
                <option value="Light_Load">Light Load</option>
                <option value="Medium_Load">Medium Load</option>
                <option value="Maximum_Load">Maximum Load</option>
            </select>

            <label>Month</label>
            <select name="month">
                <option value="January">January</option>
                <option value="February">February</option>
                <option value="March">March</option>
                <option value="April">April</option>
                <option value="May">May</option>
                <option value="June">June</option>
                <option value="July">July</option>
                <option value="August">August</option>
                <option value="September">September</option>
                <option value="October">October</option>
                <option value="November">November</option>
                <option value="December">December</option>
            </select>

            <button type="submit">Predict</button>
        </form>

        {% if prediction is not none %}
        <div class="result">
            Predicted Energy Consumption: <strong>{{ prediction }} kWh</strong>
        </div>
        {% endif %}

    </div>

</body>
</html>
